<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS-标签选择器</title>
    <style>
        /* 标签选择器：写上标签名即可 */
        p {
            color: blue;
        }

        div {
            color: red;
        }
    </style>
</head>

<body>
    <p>男生</p>
    <p>男生</p>
    <p>男生</p>
    <div>女生</div>
    <div>女生</div>
    <div>女生</div>

    标签选择器
    作用:可以把某一类标签全部选择出来。
    优点:能快速为页面中同类型的标签统一设置样式。
    缺点:不能差异化设计样式。
</body>

</html>
