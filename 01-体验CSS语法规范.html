<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>体验CSS语法规范</title>
    <style>
        /* CSS语法如下： */
        /* 选择器 {属性：值}    属性和属性值 以“键值对”出现，以英文冒号隔开 */

        p {
            /* 修改文字颜色为红色： */
            color: red;
            /* 修改文字大小为20像素： */
            font-size: 20px;
        }
    </style>
</head>

<body>
    <p>有点意思!</p>
    <br>
    CSS语法如下:选择器 {属性:值}， 属性和属性值 以“键值对”出现，以英文冒号":"隔开。
    给谁改样式 {改什么样式}
    找出标签（选对人），设置标签样式（做对事）
</body>

</html>
